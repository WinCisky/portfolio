<script>
    function hideWindow() {
        document.getElementById('window').style.display = 'none';
    }

    (function () {
        const windowEl = document.getElementById("window");
        const headerEl = document.getElementById("window-header");

        if (!windowEl || !headerEl) {
            return;
        }

        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        function snapToPixelCoords() {
            const rect = windowEl.getBoundingClientRect();
            windowEl.style.inset = "auto";
            windowEl.style.margin = "0";
            windowEl.style.left = Math.round(rect.left) + "px";
            windowEl.style.top = Math.round(rect.top) + "px";
        }

        headerEl.addEventListener("mousedown", function (event) {
            if (event.button !== 0) {
                return;
            }

            event.preventDefault();

            snapToPixelCoords();

            const rect = windowEl.getBoundingClientRect();

            offsetX = event.clientX - rect.left;
            offsetY = event.clientY - rect.top;
            isDragging = true;
        });

        headerEl.addEventListener("touchstart", function (event) {
            if (event.target.closest('.cross, [onclick]')) {
                return;
            }

            event.preventDefault();

            snapToPixelCoords();

            const touch = event.touches[0];
            const rect = windowEl.getBoundingClientRect();

            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;
            isDragging = true;
        }, { passive: false });

        document.addEventListener("mousemove", function (event) {
            if (!isDragging) {
                return;
            }

            const maxX = Math.max(0, window.innerWidth - windowEl.offsetWidth);
            const maxY = Math.max(0, window.innerHeight - windowEl.offsetHeight);
            const nextX = Math.min(Math.max(event.clientX - offsetX, 0), maxX);
            const nextY = Math.min(Math.max(event.clientY - offsetY, 0), maxY);

            windowEl.style.left = nextX + "px";
            windowEl.style.top = nextY + "px";
        });

        document.addEventListener("touchmove", function (event) {
            if (!isDragging) {
                return;
            }

            const touch = event.touches[0];
            const maxX = Math.max(0, window.innerWidth - windowEl.offsetWidth);
            const maxY = Math.max(0, window.innerHeight - windowEl.offsetHeight);
            const nextX = Math.min(Math.max(touch.clientX - offsetX, 0), maxX);
            const nextY = Math.min(Math.max(touch.clientY - offsetY, 0), maxY);

            windowEl.style.left = nextX + "px";
            windowEl.style.top = nextY + "px";
        }, { passive: true });

        document.addEventListener("mouseup", function () {
            isDragging = false;
        });

        document.addEventListener("touchend", function () {
            isDragging = false;
        });
    })();
</script>
