baseURL = 'https://ssimo.dev/'
languageCode = 'en-us'
title = 'Simone Simonella'
theme = 'minimal-portfolio'

[params]
  description = "Simone Simonella's portfolio - full-stack web developer"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Projects"
    url = "/projects/"
    weight = 2
  [[menus.main]]
    name = "Blog"
    url = "/posts/"
    weight = 3

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'